services:
  poli-jaeger:
    container_name: poli-jaeger
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_HTTP_ENABLED=true
      - JAEGER_USER=quave
      - JAEGER_PASSWORD=quave
    ports:
      - "16686:16686"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 3