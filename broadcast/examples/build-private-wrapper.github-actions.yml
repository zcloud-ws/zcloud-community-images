name: Build private Broadcast wrapper

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: Private image tag to publish
        required: true
        default: latest
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build private wrapper image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Broadcast registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.BROADCAST_REGISTRY_URL }}
          username: ${{ secrets.BROADCAST_REGISTRY_USERNAME }}
          password: ${{ secrets.BROADCAST_REGISTRY_PASSWORD }}

      - name: Login to private GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push private customer image
        uses: docker/build-push-action@v6
        with:
          context: ./broadcast
          push: true
          build-args: |
            BROADCAST_IMAGE=${{ secrets.BROADCAST_IMAGE }}
          tags: ghcr.io/${{ github.repository_owner }}/broadcast:${{ inputs.imageTag }}
